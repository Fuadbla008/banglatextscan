<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Bangla OCR Scanner</title>

    <style>
        body {
            font-family: Arial;
            padding: 20px;
            background: #f5f5f5;
        }

        .box {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        button {
            padding: 12px 20px;
            margin: 10px 0;
            cursor: pointer;
        }

        textarea {
            width: 100%;
            height: 200px;
            margin-top: 20px;
            font-size: 16px;
            padding: 10px;
        }

        img {
            width: 100%;
            margin-top: 20px;
            border-radius: 10px;
        }
    </style>

</head>

<body>

    <div class="box">

        <h2>Bangla OCR Scanner</h2>

        <input type="file" id="imageInput" accept="image/*" capture="environment">

        <br>

        <button onclick="scanText()">OCR Scan</button>

        <button onclick="submitData()">Submit To Google Sheet</button>

        <img id="preview">

        <textarea id="result" placeholder="OCR Result"></textarea>

    </div>

    <script>

        const API_KEY = "K83517729888957";

        const SCRIPT_URL = "YOUR_GOOGLE_APPS_SCRIPT_URL";

        let base64Image = "";

        document.getElementById('imageInput').addEventListener('change', function (e) {

            const file = e.target.files[0];

            const reader = new FileReader();

            reader.onloadend = function () {

                base64Image = reader.result.split(',')[1];

                document.getElementById('preview').src = reader.result;
            };

            reader.readAsDataURL(file);

        });

        async function scanText() {

            try {

                if (!base64Image) {
                    alert("Select image first");
                    return;
                }

                console.log("Scanning started");

                const body = {
                    requests: [
                        {
                            image: {
                                content: base64Image
                            },
                            features: [
                                {
                                    type: "TEXT_DETECTION"
                                }
                            ]
                        }
                    ]
                };

                const response = await fetch(
                    `https://vision.googleapis.com/v1/images:annotate?key=${API_KEY}`,
                    {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify(body)
                    }
                );

                console.log("Response received");

                const data = await response.json();

                console.log(data);

                if (data.error) {
                    alert(data.error.message);
                    return;
                }

                const text =
                    data.responses[0]?.fullTextAnnotation?.text || "No text found";

                document.getElementById('result').value = text;

            } catch (err) {

                console.error(err);

                alert("OCR Failed");

            }

        }

        async function submitData() {

            const text = document.getElementById('result').value;

            if (!text) {
                alert("No OCR text");
                return;
            }

            await fetch(SCRIPT_URL, {

                method: "POST",

                body: JSON.stringify({
                    text: text
                })

            });

            alert("Saved To Google Sheet");

        }

    </script>

</body>

</html>
