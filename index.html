<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bangla OCR Scanner</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5;
    }
    .box {
      max-width: 600px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }
    button {
      padding: 12px 20px;
      margin: 10px 0;
      cursor: pointer;
    }
    textarea {
      width: 100%;
      height: 200px;
      margin-top: 20px;
      font-size: 16px;
      padding: 10px;
    }
    img {
      width: 100%;
      margin-top: 20px;
      border-radius: 10px;
    }
    #status {
      color: #0077cc;
      font-weight: bold;
      margin: 10px 0;
    }
  </style>
</head>
<body>
  <div class="box">
    <h2> bangla OCR scanner</h2>
    <input type="file" id="imageInput" accept="image/*" capture="environment">
    <br>
    <button onclick="scanText()">OCR Scan</button>
    <button id="submitBtn" onclick="submitData()">store in google sheet</button>
    <img id="preview">
    <textarea id="result" placeholder="ocr result will show here"></textarea>
    <div id="status"></div>
  </div>

  <script>
    let base64Image = '';

    document.getElementById('imageInput').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;

      // preview
      const reader = new FileReader();
      reader.onload = function() {
        document.getElementById('preview').src = reader.result;
      };
      reader.readAsDataURL(file);

      compressImage(file, 1200, 1200, 0.7).then(compressed => {
        base64Image = compressed;
        console.log('compress size: ' + Math.round(compressed.length / 1024) + ' KB');
      });
    });

    function compressImage(file, maxWidth, maxHeight, quality) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = function(e) {
          const img = new Image();
          img.onload = function() {
            const canvas = document.createElement('canvas');
            let w = img.width, h = img.height;
            if (w > maxWidth) { h = Math.round((h * maxWidth) / w); w = maxWidth; }
            if (h > maxHeight) { w = Math.round((w * maxHeight) / h); h = maxHeight; }
            canvas.width = w; canvas.height = h;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, w, h);
            resolve(canvas.toDataURL('image/jpeg', quality));
          };
          img.onerror = reject;
          img.src = e.target.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function scanText() {
      if (!base64Image) {
        alert('please select first!');
        return;
      }
      document.getElementById('status').textContent = 'ocr running...';
      try {
        // server-side OCR call
        google.script.run
          .withSuccessHandler(function(text) {
            document.getElementById('status').textContent = '';
            if (!text.trim()) {
              alert('no text found।');
              document.getElementById('result').value = '';
            } else {
              document.getElementById('result').value = text;
            }
          })
          .withFailureHandler(function(err) {
            document.getElementById('status').textContent = '';
            alert('ocr failed: ' + err.message);
          })
          .processOCR(base64Image);
      } catch (err) {
        console.error(err);
        alert('ocr failed।');
      }
    }

    function submitData() {
      const text = document.getElementById('result').value;
      if (!text) {
        alert('empty text for store!');
        return;
      }
      if (!base64Image) {
        alert('no pictire are selected।');
        return;
      }

      document.getElementById('status').textContent = '⏳ storing...';
      document.getElementById('submitBtn').disabled = true;

      google.script.run
        .withSuccessHandler(function(response) {
          document.getElementById('status').textContent = '';
          document.getElementById('submitBtn').disabled = false;
          if (response.result === 'success') {
            alert('✅ success !\npicture link: ' + (response.imageUrl || ''));
          } else {
            alert('fail to send: ' + (response.message || ''));
          }
        })
        .withFailureHandler(function(err) {
          document.getElementById('status').textContent = '';
          document.getElementById('submitBtn').disabled = false;
          alert('error: ' + err.message);
        })
        .submitToSheet(text, base64Image);
    }
  </script>
</body>
</html>
