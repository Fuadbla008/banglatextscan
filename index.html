<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Bangla OCR Scanner</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
            background: #f5f5f5;
        }
        .box {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
        button {
            padding: 12px 20px;
            margin: 10px 0;
            cursor: pointer;
        }
        textarea {
            width: 100%;
            height: 200px;
            margin-top: 20px;
            font-size: 16px;
            padding: 10px;
        }
        img {
            width: 100%;
            margin-top: 20px;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="box">
        <h2>Bangla OCR Scanner</h2>
        <input type="file" id="imageInput" accept="image/*" capture="environment">
        <br>
        <button onclick="scanText()">OCR Scan</button>
        <button onclick="submitData()">Submit To Google Sheet</button>
        <img id="preview">
        <textarea id="result" placeholder="OCR Result"></textarea>
    </div>

    <script>
        const API_KEY = "K83517729888957";
        // নিচের URL-টা তোমার নতুন ডেপ্লয় করা Apps Script-এর URL দিয়ে বদলাও
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyi6eulWYhYeciNkmj2CVe-bvJX87bA0ObaueD1O03OBzq8Pv-s0HBJ8RmK8-U-91LLRg/exec"; // ← এখানে বসাও

        let base64Image = "";

        document.getElementById('imageInput').addEventListener('change', function (e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onloadend = function () {
                base64Image = reader.result;
                document.getElementById('preview').src = reader.result;
            };
            reader.readAsDataURL(file);
        });

        async function scanText() {
            try {
                if (!base64Image) {
                    alert("Select image first");
                    return;
                }
                console.log("Scanning started (ocr.space)");
                const formData = new FormData();
                formData.append("apikey", API_KEY);
                formData.append("base64Image", base64Image);
                formData.append("language", "auto");
                formData.append("OCREngine", "3");

                const response = await fetch("https://api.ocr.space/parse/image", {
                    method: "POST",
                    body: formData
                });
                const data = await response.json();
                if (data?.IsErroredOnProcessing) {
                    alert(data?.ErrorMessage || "OCR Error");
                    return;
                }
                const text = data?.ParsedResults?.[0]?.ParsedText || "No text found";
                document.getElementById('result').value = text;
            } catch (err) {
                console.error(err);
                alert("OCR Failed");
            }
        }

        // JSONP ব্যবহার করে কোনোরকম CORS ছাড়াই ডাটা পাঠানো
        function submitData() {
            const text = document.getElementById('result').value;
            if (!text) {
                alert("No OCR text");
                return;
            }

            // ইউনিক callback নাম তৈরি
            const callbackName = 'jsonpCallback_' + Date.now();
            window[callbackName] = function(response) {
                // কলব্যাক ফাংশন
                if (response.result === 'success') {
                    alert("Saved To Google Sheet");
                } else {
                    alert("Failed: " + (response.message || 'Unknown error'));
                }
                // script ট্যাগ ও window ফাংশন পরিষ্কার
                document.body.removeChild(scriptTag);
                delete window[callbackName];
            };

            // script ট্যাগ তৈরি করে URL-এ ডাটা ও callback বসানো
            const url = SCRIPT_URL + '?text=' + encodeURIComponent(text) + '&callback=' + callbackName;
            const scriptTag = document.createElement('script');
            scriptTag.src = url;
            document.body.appendChild(scriptTag);

            // টাইমআউট সেট করা (যদি নেটওয়ার্ক সমস্যা হয়)
            setTimeout(() => {
                if (window[callbackName]) {
                    alert("Request timed out. Check your internet.");
                    delete window[callbackName];
                    document.body.removeChild(scriptTag);
                }
            }, 10000); // ১০ সেকেন্ড
        }
    </script>
</body>
</html>
