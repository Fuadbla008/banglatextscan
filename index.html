<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bangla OCR Scanner</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
            background: #f5f5f5;
        }
        .box {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
        button {
            padding: 12px 20px;
            margin: 10px 0;
            cursor: pointer;
        }
        textarea {
            width: 100%;
            height: 200px;
            margin-top: 20px;
            font-size: 16px;
            padding: 10px;
        }
        img {
            width: 100%;
            margin-top: 20px;
            border-radius: 10px;
        }
        #status {
            color: #0077cc;
            font-weight: bold;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="box">
        <h2>📷 বাংলা ওসিআর স্ক্যানার</h2>
        <input type="file" id="imageInput" accept="image/*" capture="environment">
        <br>
        <button onclick="scanText()">OCR Scan</button>
        <button id="submitBtn" onclick="submitData()">গুগল শীটে জমা করো</button>
        <img id="preview">
        <textarea id="result" placeholder="ওসিআরের ফলাফল এখানে দেখাবে..."></textarea>
        <div id="status"></div>
    </div>

    <!-- লুকানো iframe (form target) -->
    <iframe id="hiddenFrame" name="hiddenFrame" style="display:none;"></iframe>

    <!-- ডাটা সাবমিট করার জন্য ফর্ম -->
    <form id="submitForm" action="https://script.google.com/macros/s/AKfycbyQDpWLXn8X8cqxmkalVLv51QndeEm8sT-GAqADLRK_DxZzDwGu5tcIoSqHL40X6DtFqA/exec" method="post" target="hiddenFrame" style="display:none;">
        <input type="hidden" name="text" id="formText">
        <input type="hidden" name="image" id="formImage">
    </form>

    <script>
        const API_KEY = "K83517729888957";
        // 👇 নতুন Web App URL (Apps Script থেকে ডেপ্লয় করে পাওয়া)
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyQDpWLXn8X8cqxmkalVLv51QndeEm8sT-GAqADLRK_DxZzDwGu5tcIoSqHL40X6DtFqA/exec";
        // ফর্মের action সেট করো
        document.getElementById('submitForm').action = SCRIPT_URL;

        let base64Image = "";

        // postMessage ইভেন্ট লিসেনার (iframe থেকে আসা)
        window.addEventListener('message', function(event) {
            // নিশ্চিত হও যে ইভেন্টটি আমাদের Apps Script থেকে এসেছে
            if (event.origin !== new URL(SCRIPT_URL).origin) return;

            const response = event.data;
            document.getElementById('status').textContent = "";
            document.getElementById('submitBtn').disabled = false;

            if (response.result === 'success') {
                alert("✅ সফলভাবে জমা হয়েছে!\nছবির লিংক: " + (response.imageUrl || ""));
            } else {
                alert("জমা দেওয়া যায়নি: " + (response.message || 'Unknown error'));
            }
        });

        document.getElementById('imageInput').addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function () {
                document.getElementById('preview').src = reader.result;
            };
            reader.readAsDataURL(file);

            compressImage(file, 1200, 1200, 0.7).then(compressedBase64 => {
                base64Image = compressedBase64;
                console.log("ছবি কমপ্রেস: " + Math.round(compressedBase64.length / 1024) + " KB");
            });
        });

        function compressImage(file, maxWidth, maxHeight, quality) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = function (e) {
                    const img = new Image();
                    img.onload = function () {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        if (width > maxWidth) {
                            height = Math.round((height * maxWidth) / width);
                            width = maxWidth;
                        }
                        if (height > maxHeight) {
                            width = Math.round((width * maxHeight) / height);
                            height = maxHeight;
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        const compressedBase64 = canvas.toDataURL('image/jpeg', quality);
                        resolve(compressedBase64);
                    };
                    img.onerror = reject;
                    img.src = e.target.result;
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        async function scanText() {
            try {
                if (!base64Image) {
                    alert("দয়া করে আগে ছবি সিলেক্ট করো!");
                    return;
                }
                console.log("ওসিআর শুরু...");
                const formData = new FormData();
                formData.append("apikey", API_KEY);
                formData.append("base64Image", base64Image);
                formData.append("language", "auto");
                formData.append("OCREngine", "3");

                const response = await fetch("https://api.ocr.space/parse/image", {
                    method: "POST",
                    body: formData
                });
                const data = await response.json();
                if (data?.IsErroredOnProcessing) {
                    alert("ওসিআর ত্রুটি: " + (data.ErrorMessage || "অজানা"));
                    return;
                }
                const text = data?.ParsedResults?.[0]?.ParsedText || "";
                if (text.trim() === "") {
                    alert("কোনো টেক্সট পাওয়া যায়নি। ছবির মান বা সাইজ চেক করো।");
                    document.getElementById('result').value = "";
                } else {
                    document.getElementById('result').value = text;
                }
            } catch (err) {
                console.error(err);
                alert("ওসিআর ব্যর্থ হয়েছে। ইন্টারনেট চেক করো।");
            }
        }

        function submitData() {
            const text = document.getElementById('result').value;
            if (!text) {
                alert("জমা দেওয়ার মতো টেক্সট নেই!");
                return;
            }
            if (!base64Image) {
                alert("ছবি পাওয়া যায়নি। আবার ছবি সিলেক্ট করো।");
                return;
            }

            document.getElementById('status').textContent = "⏳ জমা হচ্ছে...";
            document.getElementById('submitBtn').disabled = true;

            // ফর্মের মান সেট করে সাবমিট
            document.getElementById('formText').value = text;
            document.getElementById('formImage').value = base64Image;
            document.getElementById('submitForm').submit();
        }
    </script>
</body>
</html>
