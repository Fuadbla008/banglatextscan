<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Bangla OCR Scanner</title>

    <style>
        body {
            font-family: Arial;
            padding: 20px;
            background: #f5f5f5;
        }

        .box {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        button {
            padding: 12px 20px;
            margin: 10px 0;
            cursor: pointer;
        }

        textarea {
            width: 100%;
            height: 200px;
            margin-top: 20px;
            font-size: 16px;
            padding: 10px;
        }

        img {
            width: 100%;
            margin-top: 20px;
            border-radius: 10px;
        }
    </style>

</head>

<body>

    <div class="box">

        <h2>Bangla OCR Scanner</h2>

        <input type="file" id="imageInput" accept="image/*" capture="environment">

        <br>

        <button onclick="scanText()">OCR Scan</button>

        <button onclick="submitData()">Submit To Google Sheet</button>

        <img id="preview">

        <textarea id="result" placeholder="OCR Result"></textarea>

    </div>

    <script>

        const API_KEY = "K83517729888957";

        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyrOR3sH1dVQ3NCrP7pjueLYrozXME86rcD_vbcXqtgvZzQOkmC2Q7CcqncpYVGXvGRyQ/exec";

        let base64Image = "";

        document.getElementById('imageInput').addEventListener('change', function (e) {

            const file = e.target.files[0];

            const reader = new FileReader();

            reader.onloadend = function () {

                base64Image = reader.result;

                document.getElementById('preview').src = reader.result;
            };

            reader.readAsDataURL(file);

        });

        async function scanText() {

            try {

                if (!base64Image) {
                    alert("Select image first");
                    return;
                }

                console.log("Scanning started (ocr.space)");

                const formData = new FormData();
                formData.append("apikey", API_KEY);
                formData.append("base64Image", base64Image);
                // Use automatic language detection to avoid invalid language codes
                formData.append("language", "auto");
                // Use OCR Engine 3 for best language support (supports many languages)
                formData.append("OCREngine", "3");

                const response = await fetch("https://api.ocr.space/parse/image", {
                    method: "POST",
                    body: formData
                });

                console.log("Response received");

                const data = await response.json();

                console.log(data);

                if (data?.IsErroredOnProcessing) {
                    const msg = data?.ErrorMessage || data?.ErrorDetails || "OCR.space error";
                    alert(msg);
                    return;
                }

                const text = data?.ParsedResults?.[0]?.ParsedText || "No text found";

                document.getElementById('result').value = text;

            } catch (err) {

                console.error(err);

                alert("OCR Failed");

            }

        }

        async function submitData() {
            const text = document.getElementById('result').value;

            if (!text) {
                alert("No OCR text");
                return;
            }

            try {
                // GET রিকোয়েস্টের জন্য URL তৈরি (text এনকোড করা)
                const url = SCRIPT_URL + '?text=' + encodeURIComponent(text);

                const response = await fetch(url, {
                    method: "GET"
                    // কোনো headers বা body লাগবে না
                });

                const result = await response.json();
                if (result.result === 'success') {
                    alert("Saved To Google Sheet");
                } else {
                    alert("Failed: " + (result.message || 'Unknown error'));
                }
            } catch (err) {
                console.error(err);
                alert("Submission failed. Check console.");
            }
        }

    </script>

</body>

</html>
